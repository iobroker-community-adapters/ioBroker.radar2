# Example workflow for using the action-comment-dependabot action
# Copy this file to your repository's .github/workflows directory

name: Comment on Dependabot PRs

on:
  # Trigger when a PR is opened or updated
  # WARNING: This needs to be run in the PR base, DO NOT build untrusted code in this action
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  comment:
    runs-on: ubuntu-latest
    # Only run if actor is dependabot
    if: github.actor == 'dependabot[bot]'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Comment on Dependabot PR
        uses: iobroker-bot-orga/action-comment-dependabot@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Optional: provide a PAT with security_events:read permission to enable
          # security alert info and compatibility score in the PR comment.
          pat: ${{ secrets.PAT_FOR_DEPENDABOT_INFO }}
